<h1>Shop</h1>

@if (tenantSlug && isValidSlug) {
  <p>payment.rns-apps.dk/{{ tenantSlug }}</p>
} @else {
  <p>This is not a valid shop link. Open your shop from register or use e.g. /demo-shop</p>
}

<p>{{ status() }}</p>

@if (isValidSlug) {
  <p><a [routerLink]="['/', tenantSlug, 'checkout']">Pay with card</a></p>
}
