<h1>Pay</h1>

<p><a [routerLink]="['/', tenantSlug]">← Back to shop</a></p>

<form (ngSubmit)="submit()">
  <p>
    <label>
      Amount (DKK)
      <input name="amountDkk" type="number" min="1" step="0.01" [(ngModel)]="amountDkk" required />
    </label>
  </p>
  <p>
    <label>
      Email (optional)
      <input name="email" type="email" [(ngModel)]="email" />
    </label>
  </p>
  <p>
    <label>
      Note (optional)
      <input name="description" [(ngModel)]="description" />
    </label>
  </p>

  @if (error()) {
    <p>{{ error() }}</p>
  }

  <p>
    <button type="submit" [disabled]="loading()">Continue to Quickpay</button>
  </p>
</form>

<p>You will be redirected to Quickpay to enter card details.</p>
