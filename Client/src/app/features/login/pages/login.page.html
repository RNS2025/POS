<div class="auth-page">
  <div class="auth-card">
    <h1>Log in</h1>

    <form class="wf-form" (ngSubmit)="submit()">
      <label>
        Shop web address
        <input name="tenantSlug" [(ngModel)]="tenantSlug" placeholder="acme-bakery" />
      </label>
      <p class="wf-hint">
        The name from your shop link — e.g. payment.rns-apps.dk/acme-bakery. Leave blank for RNS platform staff.
      </p>

      <label>
        Email
        <input name="email" type="email" [(ngModel)]="email" required />
      </label>

      <label>
        Password
        <input name="password" type="password" [(ngModel)]="password" required />
      </label>

      @if (error()) {
        <p class="wf-alert error">{{ error() }}</p>
      }

      <div class="wf-form-actions">
        <button type="submit" class="wf-btn primary block" [disabled]="loading()">
          {{ loading() ? 'Logging in…' : 'Log in' }}
        </button>
      </div>
    </form>

    <p class="auth-footer"><a routerLink="/register">Create a new shop</a></p>
  </div>
</div>
