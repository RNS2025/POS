<div class="page-title">
  <h1>Change password</h1>
  <p>You must set a new password before using shop admin.</p>
</div>

@if (error()) {
  <p class="wf-alert error">{{ error() }}</p>
}

<form class="wf-form" (ngSubmit)="submit()">
  <label>
    Current password
    <input type="password" name="currentPassword" [(ngModel)]="currentPassword" required autocomplete="current-password" />
  </label>
  <label>
    New password
    <input type="password" name="newPassword" [(ngModel)]="newPassword" required minlength="8" autocomplete="new-password" />
  </label>
  <label>
    Confirm new password
    <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="8" autocomplete="new-password" />
  </label>
  <button type="submit" [disabled]="loading()">Save new password</button>
</form>
