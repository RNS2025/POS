databases:
  - name: pos-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: pos-api
    runtime: node
    rootDir: Server
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: APP_PUBLIC_URL
        fromService:
          type: web
          name: pos-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: pos-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VERIFONE_SIMULATOR
        value: "true"
      - key: PLATFORM_ADMIN_EMAIL
        sync: false
      - key: PLATFORM_ADMIN_PASSWORD
        sync: false
      - key: SEED_TENANT_NAME
        sync: false
      - key: SEED_TENANT_SLUG
        sync: false
      - key: SEED_TENANT_EMAIL
        sync: false
      - key: SEED_TENANT_PASSWORD
        sync: false

  - type: web
    name: pos-web
    runtime: static
    rootDir: Client
    region: frankfurt
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/pos-web/browser
    routes:
      - type: rewrite
        source: /api/*
        destination: https://pos-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
