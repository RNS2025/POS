<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RNS POS — Site &amp; page layout prototype</title>
  <style>
    /* Design tokens — rem-based, fluid layout */
    html {
      font-size: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
    }
    :root {
      color-scheme: light;
      --color-gray-50: #f8fafc;
      --color-gray-100: #f0f2f5;
      --color-gray-200: #e2e8f0;
      --color-gray-400: #94a3b8;
      --color-gray-600: #5c6370;
      --color-gray-900: #1a1d23;
      --color-blue-600: #2563eb;
      --color-blue-100: #dbeafe;
      --color-green-600: #059669;
      --color-green-100: #d1fae5;
      --color-amber-600: #d97706;
      --color-amber-100: #fef3c7;
      --color-violet-600: #7c3aed;
      --color-violet-100: #ede9fe;
      --color-red-600: #dc2626;
      --color-red-100: #fee2e2;
      --size-touch-min: 1.5rem;
      --size-touch-pos: 3rem;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --sidebar-proto: clamp(11rem, 22vw, 16.25rem);
      --sidebar-admin: clamp(9rem, 18vw, 11.25rem);
      --radius-sm: 0.375rem;
      --radius-md: 0.625rem;
      --radius-lg: 1rem;
      --font-sans: system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: ui-monospace, "Cascadia Code", monospace;
      --bg: var(--color-gray-100);
      --panel: #fff;
      --border: var(--color-gray-200);
      --text: var(--color-gray-900);
      --muted: var(--color-gray-600);
      --accent: var(--color-blue-600);
      --accent-soft: var(--color-blue-100);
      --kiosk: var(--color-green-600);
      --kiosk-soft: var(--color-green-100);
      --kasse: var(--color-amber-600);
      --kasse-soft: var(--color-amber-100);
      --admin: var(--color-violet-600);
      --admin-soft: var(--color-violet-100);
      --platform: var(--color-red-600);
      --platform-soft: var(--color-red-100);
      --tile: var(--color-gray-50);
      --shadow: 0 0.25rem 1.5rem rgba(0,0,0,.08);
      --ui-accent: var(--accent);
      --ui-accent-soft: var(--accent-soft);
      --ui-topbar-bg: var(--color-gray-50);
    }
    #frame-wrap[data-shell="kiosk"] { --ui-accent: var(--kiosk); --ui-accent-soft: var(--kiosk-soft); }
    #frame-wrap[data-shell="kasse"] { --ui-accent: var(--kasse); --ui-accent-soft: var(--kasse-soft); }
    #frame-wrap[data-shell="admin"] { --ui-accent: var(--admin); --ui-accent-soft: var(--admin-soft); }
    #frame-wrap[data-shell="platform"] { --ui-accent: var(--platform); --ui-accent-soft: var(--platform-soft); }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
    }
    :focus-visible {
      outline: 0.125rem solid var(--ui-accent, var(--accent));
      outline-offset: 0.125rem;
    }
    header.proto-header {
      background: var(--text);
      color: #fff;
      padding: var(--space-3) var(--space-5);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3) var(--space-5);
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
    }
    header.proto-header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }
    header.proto-header .hint {
      font-size: .8rem;
      opacity: .75;
      flex: 1 1 12rem;
      min-width: 0;
    }
    .site-tabs {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      width: 100%;
    }
    @media (min-width: 48rem) {
      .site-tabs { width: auto; }
    }
    .site-tabs button {
      border: none;
      padding: var(--space-3) var(--space-4);
      min-block-size: var(--size-touch-min);
      border-radius: var(--radius-sm);
      font-size: .85rem;
      cursor: pointer;
      background: rgba(255,255,255,.15);
      color: #fff;
    }
    .site-tabs button:hover { background: rgba(255,255,255,.25); }
    .site-tabs button.active { background: #fff; color: var(--text); font-weight: 600; }
    .site-tabs button[data-site="platform"].active { color: var(--platform); }
    .site-tabs button[data-site="admin"].active { color: var(--admin); }
    .site-tabs button[data-site="kiosk"].active { color: var(--kiosk); }
    .site-tabs button[data-site="kasse"].active { color: var(--kasse); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      min-height: calc(100vh - 3.25rem);
      width: 100%;
    }
    @media (min-width: 56.25rem) {
      .layout {
        grid-template-columns: var(--sidebar-proto) minmax(0, 1fr);
      }
    }

    .sidebar {
      background: var(--panel);
      border-bottom: 0.0625rem solid var(--border);
      padding: var(--space-4);
      overflow-y: auto;
    }
    @media (min-width: 56.25rem) {
      .sidebar {
        border-bottom: none;
        border-right: 0.0625rem solid var(--border);
      }
    }
    .sidebar h2 {
      margin: 0 0 var(--space-1);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }
    .sidebar .device-badge {
      display: inline-block;
      font-size: .7rem;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-3);
      background: var(--bg);
      color: var(--muted);
    }
    .page-list { list-style: none; margin: 0; padding: 0; }
    .page-list li { margin-bottom: var(--space-1); }
    .page-list button {
      width: 100%;
      text-align: left;
      border: 0.0625rem solid transparent;
      background: none;
      padding: var(--space-3) var(--space-3);
      min-block-size: var(--size-touch-min);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: .85rem;
      color: var(--text);
    }
    .page-list button:hover { background: var(--bg); }
    .page-list button.active {
      background: var(--ui-accent-soft, var(--accent-soft));
      border-color: var(--ui-accent, var(--accent));
      font-weight: 600;
    }
    .page-list .route {
      display: block;
      font-size: .7rem;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-top: var(--space-1);
    }
    .sidebar-notes {
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 0.0625rem solid var(--border);
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .main {
      padding: clamp(var(--space-4), 3vw, var(--space-6));
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: var(--space-4);
      width: 100%;
      min-width: 0;
    }
    .page-title {
      width: 100%;
    }
    .page-title h3 { margin: 0 0 var(--space-1); font-size: 1.25rem; }
    .page-title p { margin: 0; color: var(--muted); font-size: .9rem; }

    /* Device frames */
    .frame-wrap {
      display: flex;
      justify-content: center;
      width: 100%;
    }
    .frame-desktop {
      width: 100%;
      background: var(--panel);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .frame-ipad {
      width: 100%;
      max-width: min(100%, 51.25rem);
      aspect-ratio: 4 / 3;
      background: #111;
      border-radius: var(--space-6);
      padding: clamp(var(--space-3), 2vw, var(--space-4));
      box-shadow: var(--shadow), inset 0 0 0 0.125rem #333;
      margin-inline: auto;
    }
    .frame-ipad .screen {
      width: 100%;
      height: 100%;
      background: var(--panel);
      border-radius: var(--radius-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      container-type: inline-size;
    }

    /* Wireframe chrome inside frames */
    .wf-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-bottom: 0.0625rem solid var(--border);
      flex-wrap: wrap;
      font-size: .9rem;
      background: var(--ui-topbar-bg);
      flex-shrink: 0;
    }
    .wf-topbar .brand { font-weight: 600; font-size: 1rem; }
    .wf-topbar .sub { font-size: .75rem; color: var(--muted); }
    .wf-topbar .actions { display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap; }
    .wf-employee {
      display: inline-flex;
      align-items: center;
      padding: var(--space-1) var(--space-3);
      border-radius: 999px;
      background: var(--ui-accent-soft);
      color: var(--ui-accent);
      font-size: .8rem;
      font-weight: 600;
    }
    .wf-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-2) var(--space-4);
      min-block-size: var(--size-touch-min);
      min-inline-size: var(--size-touch-min);
      border-radius: var(--radius-sm);
      border: 0.0625rem solid var(--border);
      background: var(--panel);
      font-size: .85rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      touch-action: manipulation;
    }
    .frame-ipad .wf-btn,
    .frame-ipad .wf-chip,
    .frame-ipad .wf-tile {
      min-block-size: var(--size-touch-pos);
      min-inline-size: var(--size-touch-pos);
    }
    .wf-btn.block { width: 100%; padding-block: var(--space-4); font-size: 1rem; font-weight: 600; }
    .wf-btn.primary { background: var(--ui-accent, var(--accent)); color: #fff; border-color: var(--ui-accent, var(--accent)); }
    .wf-btn.kiosk { background: var(--kiosk); color: #fff; border-color: var(--kiosk); }
    .wf-btn.kasse { background: var(--kasse); color: #fff; border-color: var(--kasse); }
    .wf-btn.danger { border-color: #fca5a5; color: #b91c1c; background: #fff; }
    .wf-btn.ghost { background: transparent; border-color: transparent; }

    .wf-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    @media (min-width: 40rem) {
      .wf-body { flex-direction: row; }
    }
    .wf-sidebar {
      width: 100%;
      border-bottom: 0.0625rem solid var(--border);
      padding: var(--space-3) 0;
      background: #fafbfc;
      flex-shrink: 0;
    }
    @media (min-width: 40rem) {
      .wf-sidebar {
        width: var(--sidebar-admin);
        border-bottom: none;
        border-right: 0.0625rem solid var(--border);
      }
    }
    .wf-sidebar a, .wf-nav-item {
      display: block;
      padding: var(--space-2) var(--space-4);
      font-size: .85rem;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .wf-sidebar a:hover, .wf-nav-item:hover { background: var(--bg); }
    .wf-sidebar a.active, .wf-nav-item.active {
      background: var(--ui-accent-soft, var(--accent-soft));
      font-weight: 600;
      border-inline-start: 0.1875rem solid var(--ui-accent, var(--accent));
    }
    .wf-content { flex: 1; padding: var(--space-4); overflow: auto; min-block-size: 0; width: 100%; }

    .wf-chips { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-3); }
    .wf-chip {
      display: inline-flex;
      align-items: center;
      padding: var(--space-3) var(--space-4);
      border-radius: 999px;
      border: 0.0625rem solid var(--border);
      font-size: .9rem;
      background: var(--panel);
      cursor: pointer;
      font-family: inherit;
      touch-action: manipulation;
    }
    .wf-chip.active { background: var(--ui-accent, var(--text)); color: #fff; border-color: var(--ui-accent, var(--text)); }

    .wf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 7.5rem), 1fr));
      gap: var(--space-3);
    }
    @container (min-width: 32.5rem) {
      .wf-grid { grid-template-columns: repeat(auto-fill, minmax(7.5rem, 1fr)); }
    }
    @container (min-width: 42.5rem) {
      .wf-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    .wf-tile {
      background: var(--tile);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      text-align: center;
      cursor: pointer;
      border: 0.125rem solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: var(--space-2);
      touch-action: manipulation;
      transition: border-color .15s, background .15s;
    }
    .wf-tile:hover, .wf-tile:focus-visible { border-color: var(--ui-accent, var(--accent)); background: var(--ui-accent-soft, var(--accent-soft)); }
    .wf-tile .img {
      height: 3.5rem;
      background: var(--color-gray-200);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-1);
    }
    .wf-tile .name { font-size: .95rem; font-weight: 600; line-height: 1.2; }
    .wf-tile .price { font-size: .85rem; color: var(--muted); font-weight: 500; }
    .wf-tile.compact { padding: var(--space-3) var(--space-2); }
    .wf-tile.compact .name::before { content: "+ "; color: var(--ui-accent); font-weight: 700; }
    .wf-tile.compact .name { font-size: .8rem; }
    .wf-thumb {
      display: inline-block;
      width: 2.25rem;
      height: 2.25rem;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #e8e4df, #d4cfc8);
      vertical-align: middle;
    }
    .wf-thumb.empty {
      background: var(--border);
      color: var(--muted);
      font-size: .7rem;
      line-height: 2.25rem;
      text-align: center;
    }
    .wf-image-preview {
      margin: var(--space-2) 0 var(--space-4);
      max-width: min(100%, 12.5rem);
      min-height: 7.5rem;
      border: 0.0625rem dashed var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-size: .8rem;
      color: var(--muted);
      background: var(--bg);
    }
    .wf-image-preview.has-image {
      border-style: solid;
      background: linear-gradient(135deg, #e8e4df, #d4cfc8);
      color: transparent;
      min-height: 8.75rem;
    }

    .wf-footer-bar {
      padding: var(--space-4);
      border-top: 0.0625rem solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      background: var(--ui-topbar-bg);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .wf-hint { font-size: .8rem; color: var(--muted); margin: 0 0 var(--space-3); }
    .wf-hint--inline { display: inline; margin: 0; }

    .wf-split { display: flex; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
    @media (min-width: 40rem) {
      .wf-split { flex-direction: row; }
    }
    .wf-split-left { flex: 1.2; padding: var(--space-3); overflow: auto; border-bottom: 0.0625rem solid var(--border); min-width: 0; }
    @media (min-width: 40rem) {
      .wf-split-left { border-bottom: none; border-right: 0.0625rem solid var(--border); }
    }
    .wf-split-right {
      flex: 0.8;
      padding: var(--space-3);
      background: var(--color-gray-50);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      min-width: 0;
    }
    .wf-cart-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) 0;
      border-bottom: 0.0625rem solid var(--border);
      flex-wrap: wrap;
      font-size: .9rem;
    }
    .wf-qty {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }
    .wf-qty button {
      min-block-size: var(--size-touch-pos);
      min-inline-size: var(--size-touch-pos);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--panel);
      font-size: 1.1rem;
      cursor: pointer;
      font-family: inherit;
    }
    .wf-cart-total {
      margin-top: auto;
      padding-top: var(--space-4);
      font-weight: 700;
      font-size: 1.35rem;
    }
    .wf-panel-sale {
      background: var(--ui-accent-soft);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
    }
    .wf-panel-sale strong { display: block; margin-bottom: var(--space-2); font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .wf-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    .wf-table th, .wf-table td {
      text-align: left;
      padding: var(--space-3);
      border-bottom: 0.0625rem solid var(--border);
    }
    .wf-table th { background: #f8fafc; font-weight: 600; }
    .wf-badge {
      display: inline-block;
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      font-size: .75rem;
      font-weight: 600;
    }
    .wf-badge.live { background: #d1fae5; color: #065f46; }
    .wf-badge.pending { background: #fef3c7; color: #92400e; }
    .wf-badge.attention { background: #fee2e2; color: #991b1b; }

    .wf-form label {
      display: block;
      margin-bottom: var(--space-3);
      font-size: .85rem;
    }
    .wf-form input, .wf-form textarea, .wf-form select, .wf-input, .wf-search, .wf-select {
      display: block;
      width: 100%;
      max-width: 100%;
      margin-top: var(--space-2);
      padding: var(--space-3);
      min-block-size: var(--size-touch-min);
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: .9rem;
    }
    .wf-search { margin-bottom: var(--space-3); }
    .wf-fieldset {
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin: var(--space-4) 0;
    }
    .wf-fieldset legend { font-size: .85rem; font-weight: 600; padding: 0 var(--space-2); }
    .wf-link-row {
      display: flex;
      gap: var(--space-2);
      align-items: center;
      flex-wrap: wrap;
      margin: var(--space-2) 0;
    }
    .wf-link-row code, .wf-link-row .wf-input { flex: 1; font-size: .8rem; }
    .wf-empty {
      text-align: center;
      padding: var(--space-8);
      color: var(--muted);
      font-size: .9rem;
    }
    .wf-success {
      text-align: center;
      padding: var(--space-8) var(--space-6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .wf-success h2 { margin: 0 0 var(--space-2); font-size: 1.5rem; }
    .wf-pin-display {
      font-size: 2rem;
      letter-spacing: .35em;
      margin: var(--space-5) 0;
      font-family: var(--font-mono);
    }
    .wf-pinpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      width: 100%;
      max-width: 17.5rem;
      margin: 0 auto var(--space-5);
    }
    .wf-pinpad button {
      min-block-size: 3.5rem;
      min-inline-size: 3.5rem;
      border: 0.0625rem solid var(--border);
      border-radius: var(--radius-md);
      background: var(--panel);
      font-size: 1.25rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      touch-action: manipulation;
    }
    .wf-pinpad button.wide { grid-column: span 3; font-size: 1rem; }
    .wf-qr-box {
      width: min(100%, 12.5rem);
      aspect-ratio: 1;
      margin: 0 auto var(--space-5);
      border: 0.1875rem solid var(--ui-accent);
      border-radius: var(--radius-md);
      background: repeating-linear-gradient(45deg, var(--color-gray-900) 0 0.25rem, var(--panel) 0.25rem 0.5rem);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wf-qr-box span {
      background: var(--panel);
      padding: var(--space-2) var(--space-3);
      font-size: .75rem;
      font-weight: 700;
      border-radius: var(--radius-sm);
    }
    .wf-waiting {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: 999px;
      background: var(--ui-accent-soft);
      color: var(--ui-accent);
      font-size: .85rem;
      margin-top: var(--space-3);
    }
    .wf-countdown { font-size: .9rem; color: var(--muted); margin-top: var(--space-5); }
    .wf-icon-ok {
      width: 4rem;
      height: 4rem;
      border-radius: 50%;
      background: var(--kiosk-soft);
      color: var(--kiosk);
      display: flex;
      align-items: center;

  let currentSite = 'platform';

  function nav(site, pageId) {
    currentSite = site;
    currentPage = pageId;
    document.querySelectorAll('.site-tabs button').forEach((b) => {
      b.classList.toggle('active', b.dataset.site === site);
    });
    render();
  }

  function renderSidebar() {
    const site = SITES[currentSite];
    const ul = site.pages.map((p) => `
      <li>
        <button type="button" class="${p.id === currentPage ? 'active' : ''}" data-page="${p.id}">
          ${p.title}
          <span class="route">${p.route}</span>
        </button>
      </li>
    `).join('');
    document.getElementById('sidebar').innerHTML = `
      <h2>${site.label}</h2>
      <span class="device-badge">${site.device}</span>
      <ul class="page-list">${ul}</ul>
      <div class="sidebar-notes">${site.notes}</div>
      <div class="sidebar-notes sidebar-notes--flow"><strong>Site flow:</strong><br>${SITE_FLOWS[currentSite]}</div>
    `;
    document.getElementById('sidebar').querySelectorAll('[data-page]').forEach((btn) => {
      btn.addEventListener('click', () => nav(currentSite, btn.dataset.page));
    });
  }

  function renderTitle() {
    const site = SITES[currentSite];
    const page = site.pages.find((p) => p.id === currentPage);
    const feat = PAGE_FEATURES[currentPage];
    document.getElementById('page-title').innerHTML = `
      <h3>${page.title}</h3>
      <p><code>${page.route}</code> — ${page.desc}</p>
    `;
    if (feat) {
      const exitHtml = (feat.exit || []).map((e) =>
        `<span class="flow-chip">${e.label} → <button type="button" data-goto="${e.goto}">${e.goto.split('/').pop()}</button></span>`
      ).join('');
      document.getElementById('features-panel').innerHTML = `
        <div class="features-meta">Auth: <code>${feat.auth}</code>${feat.api?.length ? ` · API: ${feat.api.map((a) => `<code>${a}</code>`).join(', ')}` : ''}${feat.stores ? ` · Stores: <code>${feat.stores}</code>` : ''}</div>
        <div class="features-grid">
          <section><h4>Features (v1)</h4><ul>${feat.features.map((f) => `<li>${f}</li>`).join('')}</ul></section>
          <section><h4>Enter from</h4><ul>${feat.enter.map((f) => `<li>${f}</li>`).join('')}</ul></section>
        </div>
        <h4>Exit to</h4>
        <div class="flow-row">${exitHtml || '<span class="wf-hint">—</span>'}</div>
        <p class="wf-hint wf-stack-top">Full reference: <code>docs/design/page-features-and-flows.md</code></p>
      `;
      wire(document.getElementById('features-panel'));
    } else {
      document.getElementById('features-panel').innerHTML = '';
    }
    document.getElementById('iteration-notes').innerHTML = ITERATION[currentPage]
      ? `<strong>Open question:</strong> ${ITERATION[currentPage]}`
      : '';
  }

  function wire(el) {
    el.querySelectorAll('[data-goto]').forEach((node) => {
      node.addEventListener('click', (e) => {
        e.preventDefault();
        const [site, page] = node.dataset.goto.split('/');
        nav(site, page);
      });
    });
  }

    return `<div class="frame-desktop"><div class="screen">${html}</div></div>`;

  function frameIpad(html) {

  function pinPadHtml(okGoto) {
    const keys = [1,2,3,4,5,6,7,8,9,'C',0,'⌫'];
    return `
      <div class="wf-pin-display" aria-hidden="true">••••</div>
      <div class="wf-pinpad" role="group" aria-label="PIN keypad">

  function phonePadHtml(okGoto, display = '12 34 56 78') {
    const keys = [1,2,3,4,5,6,7,8,9,'C',0,'⌫'];
    return `
      <div class="wf-pin-display" aria-hidden="true">${display}</div>
      <div class="wf-pinpad" role="group" aria-label="Phone keypad">
        ${keys.map((k) => `<button type="button">${k}</button>`).join('')}
        <button type="button" class="wf-btn kiosk wide" data-goto="${okGoto}">Start køb</button>
      </div>`;
  }

  function productTilesHtml(items, opts = {}) {
    const { compact = false, goto = '' } = opts;
    return items.map((p) => {
      const [n, pr] = p.split('|');
      const cls = compact ? 'wf-tile compact' : 'wf-tile';
      const go = goto ? ` data-goto="${goto}"` : '';
      const img = compact ? '' : '<div class="img"></div>';
      return `<div class="${cls}"${go}>${img}<div class="name">${compact ? n : n}</div><div class="price">${pr} kr</div></div>`;
    }).join('');
  }

    'kasse-popup': () => frameIpad(`
      <div class="wf-topbar">
        <div>
          <div class="brand">Pop-up</div>
          <div class="sub">QR only</div>
        </div>
        <span class="wf-employee">Jens</span>
      </div>
      <div class="wf-split">
        <div class="wf-split-left">
          <div class="wf-grid">
            ${productTilesHtml(['Latte|49','Cookie|19'], { compact: true })}
          </div>
        </div>
        <div class="wf-split-right">
          <div class="wf-panel-sale">
            <strong>Aktuelt salg</strong>
            ${cartLineHtml('Latte', 1, 49)}
          </div>
          <div class="wf-cart-total">I alt: 49 kr</div>
          <button type="button" class="wf-btn kasse block" data-goto="kasse/kasse-qr">Pay with QR</button>
          <p class="wf-hint wf-mt-auto">Ingen terminal · ingen kontant</p>
        </div>
      </div>
    `),

    'kasse-qr': () => frameIpad(`
      <div class="wf-topbar">
        <button type="button" class="wf-btn ghost" data-goto="kasse/kasse-popup">← Annuller</button>
        <span class="brand">Scan og betal · 49 kr</span>
      </div>
      <div class="wf-content wf-success">
        <div class="wf-qr-box" role="img" aria-label="QR-kode til betaling"><span>QR</span></div>
        <p>Kunden scanner med mobilen</p>
        <div class="wf-waiting">Quickpay · venter på betaling…</div>
        <p class="wf-stack-top-lg"><button type="button" class="wf-btn kasse" data-goto="kasse/kasse-receipt">Simuler betalt</button></p>
      </div>
    `),

    'kasse-terrace': () => frameIpad(`
      <div class="wf-topbar">
        <span class="brand">Terrace · Demo Coffee</span>
        <span style="font-size:.75rem;color:var(--muted)">VF-002</span>
      </div>
      <div class="wf-split">
        <div class="wf-split-left">
          <p class="wf-muted-sm">8 products on this iPad</p>
          <div class="wf-grid">
            ${['Latte|49','Wine glass|65','Cappuccino|49','Sandwich|79'].map((p) => {
              const [n, pr] = p.split('|');
              return `<div class="wf-tile"><div class="name">+ ${n}</div><div class="price">${pr} kr</div></div>`;
            }).join('')}
          </div>
          <p class="wf-muted-xs wf-stack-top">Croissant not assigned to Terrace</p>
        </div>
        <div class="wf-split-right">
          <strong>Current sale</strong>
          <div class="wf-cart-line"><span>Wine glass × 1</span><span>65 kr</span></div>
          <div class="wf-cart-total">Total: 65 kr</div>
          <p class="wf-stack-top"><button type="button" class="wf-btn kasse block">Charge card</button></p>
        </div>
      </div>
    `),

    'kasse-receipt': () => frameIpad(`
      <div class="wf-topbar">
        <button type="button" class="wf-btn ghost" data-goto="kasse/kasse-register">← Nyt salg</button>
        <span class="brand">Godkendt</span>
      </div>
      <div class="wf-content wf-success">
        <div class="wf-icon-ok" style="background:var(--kasse-soft);color:var(--kasse)">✓</div>
        <h2>78 kr betalt</h2>
        <p>#d4e5f6 · Maria · Front counter</p>
        <table class="wf-table wf-stack-top-lg wf-narrow-block">
          <tr><td>Latte × 1</td><td>49 kr</td></tr>
          <tr><td>Croissant × 1</td><td>29 kr</td></tr>
        </table>
        <button type="button" class="wf-btn kasse block wf-stack-top-lg wf-narrow-block" data-goto="kasse/kasse-register">Næste salg</button>
      </div>
    `),
  };

  function renderFrame() {
    const wrap = document.getElementById('frame-wrap');
    wrap.dataset.shell = currentSite;
    const fn = WIREFRAMES[currentPage];
    wrap.innerHTML = fn ? fn() : '<p class="wf-empty">Wireframe not found</p>';
    wire(wrap);
  }

  function render() {
    renderSidebar();
    renderTitle();
    renderFrame();
  }

  document.querySelectorAll('.site-tabs button').forEach((btn) => {
    btn.addEventListener('click', () => {
      const site = btn.dataset.site;
      const first = SITES[site].pages[0].id;
      nav(site, first);
    });
  });

  render();
})();
</script>
</body>
</html>
